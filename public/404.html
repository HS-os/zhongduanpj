<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 400px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #667eea;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 15px;
    }
    p {
      color: #666;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>页面不存在</h1>
    <p>抱歉，您访问的页面不存在或已过期。</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
